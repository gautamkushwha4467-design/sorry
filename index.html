<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorry Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Start Screen -->
    <div id="startScreen" class="screen active">
        <div class="container">
            <h1 class="title">Hey...</h1>
            <p class="subtitle">Can you play this small game first? 🥺</p>
            <button class="btn btn-primary" onclick="startGame()">Start</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="screen">
        <div class="game-header">
            <div class="score">Sorry Points: <span id="scoreValue">0</span> ❤️</div>
            <div class="goal">Goal: 10 points</div>
        </div>

        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <div class="game-info">
            Laptop: Use ← → arrow keys or A/D. Mobile: Use buttons below. Catch the food! 🍔🍕
        </div>

        <!-- Mobile Moving Buttons -->
        <div class="mobile-controls">
            <button id="leftBtn">⬅️</button>
            <button id="rightBtn">➡️</button>
        </div>
    </div>

    <!-- Final Screen -->
    <div id="finalScreen" class="screen">
        <div class="container">
            <div class="final-message">
                <p class="message-text">You collected enough love-food ❤️</p>
                <p class="message-text">Now...</p>
                <p class="apology-text">I'm really sorry 🥺</p>

                <div class="hearts-container">
                    <div class="heart">💕</div>
                    <div class="heart">💕</div>
                    <div class="heart">💕</div>
                </div>
            </div>

            <button class="btn btn-primary" onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
